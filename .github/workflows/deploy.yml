name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all apps
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/connectivity _site/auth-messages _site/adhoc-job _site/chatter _site/forms-improvement _site/sparkle-help-agent _site/search-filtering
          cp index.html _site/
          cp -r apps/connectivity/dist/* _site/connectivity/
          cp -r apps/auth-messages/dist/* _site/auth-messages/
          cp -r apps/adhoc-job/dist/* _site/adhoc-job/
          cp -r apps/chatter/dist/* _site/chatter/
          cp -r apps/forms-improvement/dist/* _site/forms-improvement/
          cp -r apps/sparkle-help-agent/dist/* _site/sparkle-help-agent/
          cp -r apps/search-filtering/dist/* _site/search-filtering/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
